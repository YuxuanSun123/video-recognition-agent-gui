name: Release Desktop Builds

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.2.2-codex
        required: true
        default: v0.2.2-codex
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
            args: ""
          - platform: macos-latest
            label: macOS
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v7

      - name: Set release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload ${{ matrix.label }} bundle
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned macOS test build. To publish a Gatekeeper-friendly Mac app,
          # add a separate signed/notarized workflow with Apple Developer secrets.
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Shot Reader ${{ env.RELEASE_TAG }}"
          releaseBody: |
            Shot Reader desktop build with Codex Agent mode.

            - Windows: installer assets generated by Tauri.
            - macOS: app bundle generated on GitHub macOS runner.
            - Codex mode uses the local Codex CLI login state. No OpenAI API key is bundled or collected by the app.

            DashScope/Qwen settings remain available as advanced legacy mode. API keys are not bundled.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
